		<h1>昭和村の歴史</h1>

<figure class="wp-block-table is-style-regular"><table><tbody><tr><td>時代</td><td>西暦</td><td>和暦</td><td>昭和村関係の動向　◆会津地方　●日本国内　■世界</td></tr><tr><td>飛鳥時代</td><td>645</td><td>大化１年</td><td>●大化の改新</td></tr><tr><td>奈良時代</td><td>718</td><td>養老２年</td><td>◆石背国の中に会津郡が設置される</td></tr><tr><td>平安時代</td><td>935</td><td>承平５年</td><td>◆会津郡から大沼、河沼の２郡が分離</td></tr><tr><td></td><td>1189</td><td>文治５年</td><td>◆源頼朝の平泉藤原征討に功のあった芦名、山ノ内、河原田、長沼の四氏に領地が与えられたといわれる</td></tr><tr><td>鎌倉時代</td><td>1221</td><td>承久３年</td><td>●承久の乱</td></tr><tr><td>室町時代</td><td><span style="color:#cf2e2e" class="tadv-color">1402</span></td><td><span style="color:#cf2e2e" class="tadv-color">応永９年</span></td><td><span style="color:#cf2e2e" class="tadv-color">山ノ内氏（十代）が会津に移住、金山谷にはいり、横田に居を構える</span></td></tr><tr><td>室町・戦国時代</td><td>1467</td><td>応仁１年</td><td>●応仁の乱</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">1473</span></td><td><span style="color:#cf2e2e" class="tadv-color">文明５年</span></td><td><span style="color:#cf2e2e" class="tadv-color">野尻牛首城を山ノ内信濃守俊詮、修築する</span></td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">1525</span></td><td><span style="color:#cf2e2e" class="tadv-color">大永５年</span></td><td><span style="color:#cf2e2e" class="tadv-color">田島の長沼勢が野尻領に出兵、野尻勢と喰丸の猿館で合戦する</span></td></tr><tr><td></td><td>1543</td><td>天文12年</td><td>●鉄砲伝来</td></tr><tr><td>織豊時代</td><td>1582</td><td>天正10年</td><td>●本能寺の変</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">1590</span></td><td><span style="color:#cf2e2e" class="tadv-color">天正18年</span></td><td><span style="color:#cf2e2e" class="tadv-color">山ノ内氏、会津領を支配する芦名氏を攻め滅ぼした伊達政宗と只見で合戦するが敗れ、所領没収され一族離散</span></td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">1594</span></td><td><span style="color:#cf2e2e" class="tadv-color">文禄３年</span></td><td><span style="color:#cf2e2e" class="tadv-color">喰丸、大芦などで太閤検地すすめられる。野尻組は六ヶ村だった。</span></td></tr><tr><td>江戸時代</td><td>1600</td><td>慶長５年</td><td>●関ヶ原の戦い</td></tr><tr><td></td><td>1611</td><td>慶長16年</td><td>◆会津地方に大地震</td></tr><tr><td></td><td>1632</td><td>寛永８年</td><td>◆会津地方に大洪水</td></tr><tr><td></td><td>1639</td><td>寛永16年</td><td>●鎖国令が出る</td></tr><tr><td></td><td>1643</td><td>寛永20年</td><td>◆保科正之が会津に入部、大沼郡の大部分と南会津郡全域が天領「南山御蔵入領」となり、会津藩のお預け支配となる</td></tr><tr><td></td><td>1716</td><td>享保１年</td><td>●享保の改革始まる</td></tr><tr><td></td><td>1720</td><td>享保５年</td><td>◆南山御蔵入騒動が起きる</td></tr><tr><td></td><td>1775</td><td>安永４年</td><td>■米、独立戦争起こる</td></tr><tr><td></td><td>1782</td><td>天明２年</td><td>●天明の大飢饉</td></tr><tr><td></td><td>1787</td><td>天明７年</td><td>●寛政の改革始まる</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">1794</span></td><td><span style="color:#cf2e2e" class="tadv-color">寛政６年</span></td><td><span style="color:#cf2e2e" class="tadv-color">野尻代官所が設けられるが、まもなく廃止</span></td></tr><tr><td></td><td>1828</td><td>文政12年</td><td>●シーボルト事件起こる</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">1831</span></td><td><span style="color:#cf2e2e" class="tadv-color">天保２年</span></td><td><span style="color:#cf2e2e" class="tadv-color">家数460軒、人口2315人となる</span></td></tr><tr><td></td><td>1833</td><td>天保４年</td><td>●天保の大飢饉</td></tr><tr><td></td><td>1840</td><td>天保11年</td><td>■アヘン戦争起こる</td></tr><tr><td></td><td>1841</td><td>天保12年</td><td>●天保の改革</td></tr><tr><td></td><td>1853</td><td>嘉永６年</td><td>●黒船来航</td></tr><tr><td></td><td>1861</td><td>文久１年</td><td>●米、南北戦争</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">1863</span></td><td><span style="color:#cf2e2e" class="tadv-color">文久３年</span></td><td><span style="color:#cf2e2e" class="tadv-color">会津藩へ編入となる</span></td></tr><tr><td></td><td>1867</td><td>慶応３年</td><td>●大政奉還　◆戊辰戦争</td></tr><tr><td>明治時代</td><td><span style="color:#cf2e2e" class="tadv-color">1868</span></td><td><span style="color:#cf2e2e" class="tadv-color">明治元年</span></td><td><span style="color:#cf2e2e" class="tadv-color">西軍の侵攻、大芦の戦で29軒焼失<br></span><span style="color:#000000" class="tadv-color">●五箇条 年</span></td><td><span style="color:#cf2e2e" class="tadv-color">昭和温泉「しらかば荘」新装オープン<br>からむし織の里「道の駅」認定・再オープン<br>からむし工芸博物館入館者10万人達成<br>からむし生産伝承と織姫事業が手づくり郷土賞(国土交通大臣表彰)受賞<br>昭和村のかすみ草が国内花卉で日本一の称号得る</span><br>●全国的にマイマイガ大量発生</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">2015</span></td><td><span style="color:#cf2e2e" class="tadv-color">平成27年</span></td><td><span style="color:#cf2e2e" class="tadv-color">小中津川村営住宅完成(2棟、12世帯)<br>草加市・昭和村友好交流宣言30周年、姉妹都市締結5周年<br>台風18号関連豪雨災害発生(激甚災害に指定)<br>矢ノ原地区公衆トイレ完成(自然エネルギーを活用したバイオトイレ)</span><br>●JR北陸新幹線開業</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">2016</span></td><td><span style="color:#cf2e2e" class="tadv-color">平成28年</span></td><td><span style="color:#cf2e2e" class="tadv-color">機構改革により「からむし振興室、観光交流係」新設<br>会津の三十三観音めぐりが日本遺産認定(御蔵入7番札所佐倉観音寺)<br>昭和福祉会への福祉事業を一元化<br>特別養護老人ホーム・ユニット館オープン</span><br>●新生「JA会津よつば」発足　●JR北海道新幹線開通<br>●熊本地震、鳥取県中部地震発生</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">2017</span></td><td><span style="color:#cf2e2e" class="tadv-color">平成29年</span></td><td><span style="color:#cf2e2e" class="tadv-color">戸籍電算化運用開始<br>新規就農施策「かすみの学校」開設<br>新規就農促進住宅完成(1棟、2世帯)<br>喰丸小改修工事着手<br>上昭和地区簡易水道水源拡張工事着手(～令和元年)<br>「奥会津昭和からむし織」国の伝統的工芸品に指定<br>村政施行90周年、記念要覧発行</span><br>●天皇退位に関する皇室典範特例法公布</td></tr><tr><td></td><td><span style="color:#cf2e2e" class="tadv-color">2018</span></td><td><span style="color:#cf2e2e" class="tadv-color">平成30年</span></td><td><span style="color:#cf2e2e" class="tadv-color">交流・観光拠点施設「喰丸小」オープン<br>昭和中学校「花育」が文部科学大臣表彰受賞<br>国道401号博士峠工区トンネル着工</span><br>●北海道胆振東部地震　●築地市場閉場</td></tr><tr><td>令和時代</td><td><span style="color:#cf2e2e" class="tadv-color">2019</span></td><td><span style="color:#cf2e2e" class="tadv-color">令和元年</span></td><td><span class="tadv-color" style="color:#cf2e2e">4月29日に、昭和の日を記念してイベントを開催</span><br>●2019年5月1日に「令和」と改元</td></tr><tr><td></td><td><span class="tadv-color" style="color:#cf2e2e">2020</span></td><td><span class="tadv-color" style="color:#cf2e2e">令和2年</span></td><td><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">村内でFMラジオが視聴可能に</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">新型コロナウイルス村対策本部を設置</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">歴史的小雪</span></span><br>●新型コロナウイルス感染拡大・緊急事態宣言発令</td></tr><tr><td></td><td><span class="tadv-color" style="color:#cf2e2e">2021</span></td><td><span class="tadv-color" style="color:#cf2e2e">令和3年</span></td><td><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">かすみ草の販売額が5億円突破・記念式典開催</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">新型コロナウイルスワクチン接種開始</span></span><br>●2020東京オリンピック・パラリンピックが1年延期して開催</td></tr><tr><td></td><td><span class="tadv-color" style="color:#cf2e2e">2022</span></td><td><span class="tadv-color" style="color:#cf2e2e">令和4年</span></td><td><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">全国初公道での除雪車の遠隔操作による除雪作業を実施</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">昭和村周辺で風力発電事業計画浮上も反対運動あり、廃止</span></span><br>●ロシアがウクライナに侵攻</td></tr><tr><td></td><td><span class="tadv-color" style="color:#cf2e2e">2023</span></td><td><span class="tadv-color" style="color:#cf2e2e">令和5年</span></td><td><span class="tadv-color" style="color:#cf2e2e">9月10日</span><span class="tadv-color" style=""><span class="tadv-color" style="color: rgb(207, 46, 46);">博士トンネル開通</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">からむし織体験生制度30周年・記念シンポジウムを開催</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">からむんバス運行スタート</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">7月20日に「昭和かすみ草」G1登録、同日、7月20日を「昭和かすみ草の日」と制定</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">4月3日「かすみ草の村」を宣言</span></span><br>●新型コロナウイルス「5類」へ移行</td></tr><tr><td></td><td><span class="tadv-color" style="color:#cf2e2e">2024</span></td><td><span class="tadv-color" style="color:#cf2e2e">令和6年</span></td><td><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">昭和かすみ草部会が天皇杯受賞、販売額7億円突破</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">JAかすみ草部会「第53回日本農業賞」大賞受賞</span></span><br><span class="tadv-color" style="color:#cf2e2e"><span class="tadv-color" style="color:#cf2e2e">公共インフラWi-Fiネットワーク整備工事が完了</span></span><br>●令和6年能登地震発生</td></tr><tr><td></td><td><span class="tadv-color" style="color:#cf2e2e">2025</span></td><td><span class="tadv-color" style="color:#cf2e2e">令和7年</span></td><td></td></tr></tbody></table></figure>
